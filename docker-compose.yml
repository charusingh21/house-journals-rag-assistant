services:
  house-journals-ui:
    image: python:3.12-slim
    working_dir: /app
    command: bash -lc "./scripts/setup.sh && ./scripts/run.sh"
    ports:
      - "5056:5056"
    environment:
      RAG_API_URL: ${RAG_API_URL:-http://host.docker.internal:8081/v1/generate}
      INGESTOR_API_URL: ${INGESTOR_API_URL:-http://host.docker.internal:8082/v1/documents}
      RAG_COLLECTION: ${RAG_COLLECTION:-house_journals_full_demo}
      RAG_MODEL: ${RAG_MODEL:-nvidia/llama-3.3-nemotron-super-49b-v1.5}
      HOUSE_JOURNALS_SAMPLE_DIR: /app/HouseJournalSample
      HOUSE_JOURNALS_INDEX_DB: /app/data/house_journals_index.sqlite
    volumes:
      - .:/app
